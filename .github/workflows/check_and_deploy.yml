name: CheckAndDeploy

on:
  push:
    branches:
      - release

# env:
#   IMAGE: ghcr.io/igor-526/haintly_main-be

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Install deps
        run: uv sync --locked

      - name: lint
        run: make lint

      - name: test
        run: make test

